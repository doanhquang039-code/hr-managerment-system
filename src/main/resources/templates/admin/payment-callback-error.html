<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lỗi Thanh toán - HRMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 500px;
            text-align: center;
        }
        .error-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .error-message {
            background: #fff3cd;
            border: 1px solid #ffe69c;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">❌</div>
        <h2 class="mb-3">Lỗi thanh toán</h2>
        <p class="text-muted mb-4">Đã xảy ra lỗi trong quá trình xử lý thanh toán</p>
        
        <div class="error-message" th:if="${error}">
            <strong>Lý do:</strong> <span th:text="${error}"></span>
        </div>
        
        <div class="d-grid gap-2">
            <a th:href="@{/admin/payment}" class="btn btn-danger btn-lg">
                ← Quay lại Danh sách thanh toán
            </a>
            <a th:href="@{/admin/payment/create}" class="btn btn-outline-primary">
                ➕ Tạo thanh toán mới
            </a>
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">
                🏠 Về Dashboard
            </a>
        </div>
    </div>
</body>
</html>

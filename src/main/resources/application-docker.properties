spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/hr_management_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}

# Cloud-friendly defaults
spring.jpa.show-sql=false
logging.level.org.springframework.security=INFO
server.forward-headers-strategy=framework

# Actuator for health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=never

